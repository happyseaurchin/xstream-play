<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      color: #333;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #ddd; }
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .tagline {
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }
    label {
      font-size: 12px;
      font-weight: 500;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    @media (prefers-color-scheme: dark) { label { color: #999; } }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(128,128,128,0.3);
      border-radius: 6px;
      font-size: 13px;
      background: transparent;
      color: inherit;
      outline: none;
      font-family: monospace;
    }
    input:focus { border-color: rgba(128,128,128,0.6); }
    .save-btn {
      width: 100%;
      padding: 8px;
      margin-top: 12px;
      border: 1px solid rgba(128,128,128,0.3);
      border-radius: 6px;
      background: transparent;
      color: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: rgba(128,128,128,0.1); }
    .status {
      font-size: 11px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      display: block;
      background: #eaf3de;
      color: #3b6d11;
    }
    .status.info {
      display: block;
      background: #e6f1fb;
      color: #185fa5;
    }
    @media (prefers-color-scheme: dark) {
      .status.success { background: #27500a; color: #c0dd97; }
      .status.info { background: #0c447c; color: #b5d4f4; }
    }
    .note {
      font-size: 10px;
      color: #999;
      margin-top: 12px;
      line-height: 1.4;
    }
    .clear-btn {
      font-size: 11px;
      color: #888;
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      text-decoration: underline;
    }
    .clear-btn:hover { color: #c44; }
  </style>
</head>
<body>
  <div class="logo">xstream</div>
  <div class="tagline">your intelligence, any surface</div>

  <label for="api-key">Anthropic API key</label>
  <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">

  <button class="save-btn" id="save-btn">Save</button>

  <div class="status" id="status"></div>

  <button class="clear-btn" id="clear-btn" style="display:none;">Clear key and disable</button>

  <div class="note">
    Your key stays in this browser. It is sent only to the Anthropic API —
    never to xstream servers. Each LLM call uses your own account.
  </div>

  <script src="popup.js"></script>
</body>
</html>
